[project]
name = "kbot-installer"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "aiofiles",
    "click",
    "colorama",
    "defusedxml",
    "furl",
    "gitpython",
    "httpx",
    "psutil",
    "pygit2",
    "python-dotenv",
    "requests",
    "rich",
    "tqdm",
]

[project.scripts]
kbot-installer = "kbot_installer.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kbot_installer"]

[[tool.uv.index]]
name = "konverso-nexus"
url = "https://nexus.konverso.ai/repository/python_whl/simple/"
publish-url = "https://nexus.konverso.ai/repository/python_whl/"

[tool.coverage.run]
data_file = "/tmp/.coverage"
omit = [
    "*/*example*",
    "*/*examples*",
    "*/test_*",
    "*/tests/*",
    "*/__pycache__/*",
    "*/.*",
    "gitpassword.py",
    "nexus.py",
    "kbot.py",
    "setup_workarea.py",
]

[tool.coverage.html]
directory = "/tmp/htmlcov"

[dependency-groups]
lint = [
    "pylint",
    "ruff",
]

typecheck = [
    "ty",
]

test = [
    "pytest",
    "pytest-asyncio",
    "pytest-cov",
]

dev = [
    { include-group = "lint" },
    { include-group = "typecheck" },
    { include-group = "test" },
]
