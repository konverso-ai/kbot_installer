[project]
name = "kbot-installer"
version = "2.0.0"
requires-python = "==3.12.13"
dependencies = [
    "aiofiles",
    "click",
    "colorama",
    "defusedxml",
    "furl",
    "gitpython",
    "httpx",
    "psutil",
    "pygit2",
    "python-dotenv",
    "requests",
    "rich",
    "tqdm",
]

[project.scripts]
kbot-installer = "cli.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel.sources]
"core/python" = "."

[tool.hatch.build.targets.wheel.force-include]
"description.xml" = "installer/kbot_installer/description.xml"
"pyproject.toml" = "installer/kbot_installer/pyproject.toml"

[[tool.uv.index]]
name = "konverso-aws-private"
url = "https://konverso-872515286329.d.codeartifact.eu-west-3.amazonaws.com/pypi/private-pypi/simple/"
publish-url = "https://konverso-872515286329.d.codeartifact.eu-west-3.amazonaws.com/pypi/private-pypi/"

[[tool.uv.index]]
name = "konverso-aws-pypi-proxy"
url = "https://konverso-872515286329.d.codeartifact.eu-west-3.amazonaws.com/pypi/pypi-proxy/simple/"
default = true

[dependency-groups]
lint = [
    "pylint",
    "ruff",
]

typecheck = [
    "ty",
]

test = [
    "pytest",
    "pytest-asyncio",
    "pytest-cov",
]

dev = [
    { include-group = "lint" },
    { include-group = "typecheck" },
    { include-group = "test" },
]
