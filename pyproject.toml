[project]
name = "kbot-installer"
version = "2.0.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Korantin Lévêque", email = "korantin.leveque@konverso.ai" }
]
requires-python = "==3.10.15"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["core/python", "rest"]
py-modules = ["Bot", "Load", "Learn", "System"]

[tool.hatch.build.targets.wheel.sources]
"core/python" = "."
"rest" = "."

[tool.hatch.build.targets.wheel.force-include]
"description.xml" = "installer/kbot_installer/description.xml"
"pyproject.toml" = "installer/kbot_installer/pyproject.toml"

[dependency-groups]
lint = [
    "pylint",
    "pylint-django",
    "pylint-django-settings",
    "pylint-plugin-utils",
    "ruff"
]

typecheck = [
    "ty"
]

test = [
    "pytest",
    "pytest-cov",
    "testcontainers",
]

dev = [
    { include-group = "lint" },
    { include-group = "typecheck" },
    { include-group = "test" },
]

[[tool.uv.index]]
name = "konverso-nexus"
url = "https://nexus.konverso.ai/repository/python_whl/simple/"
publish-url = "https://nexus.konverso.ai/repository/python_whl/"
default = true

[[tool.uv.index]]
name = "pypi"
url = "https://pypi.org/simple"
