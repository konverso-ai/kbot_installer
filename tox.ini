[tox]
requires =
    tox>=4.22
    tox-uv>=1.31
env_list =
    py310-{deps,lint,typecheck,test}
    py312-{deps,lint,typecheck,test}

[testenv]
package = wheel
runner = uv-venv-lock-runner
uv_sync_locked = true
no_default_groups = true
passenv =
    UV_*
setenv =
    PYTHONDONTWRITEBYTECODE = 1
    PYTHONPATH = {toxinidir}/core/python
dependency_groups =
    deps: deps
    lint: lint
    typecheck: typecheck
    test: test
commands =
    deps: deptry .
    lint: ruff check
    lint: pylint --errors-only core/python
    typecheck: ty check core/python
    test: pytest core/python {posargs}
